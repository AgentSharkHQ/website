<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found · AgentShark</title>
    <meta name="description" content="The page you're looking for doesn't exist. Head back to AgentShark — the operating system for the AI agent economy." />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#0A0B10" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --color-abyss: #0A0B10;
        --color-text-primary: #F2F0EA;
        --color-text-secondary: #9FA0B0;
        --color-text-tertiary: #7A7B92;
        --color-accent: #5C92FF;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        background: var(--color-abyss);
        color: var(--color-text-primary);
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.25rem;
        overflow: hidden;
      }
      .wrap {
        text-align: center;
        max-width: 480px;
      }
      .code {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.3rem 0.85rem 0.3rem 0.5rem;
        border-radius: 9999px;
        border: 1px solid rgba(255,255,255,0.07);
        background: rgba(255,255,255,0.03);
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 0.6875rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--color-text-tertiary);
        margin-bottom: 1.75rem;
      }
      .dot {
        width: 6px; height: 6px; border-radius: 9999px;
        background: var(--color-accent);
        box-shadow: 0 0 8px var(--color-accent);
      }
      h1 {
        font-family: 'Sora', system-ui, sans-serif;
        font-size: clamp(2.25rem, 4.4vw, 4rem);
        font-weight: 700;
        line-height: 1.0;
        letter-spacing: -0.045em;
        margin-bottom: 1rem;
      }
      p {
        color: var(--color-text-secondary);
        font-size: 1rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      a.cta {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.8125rem 1.5rem;
        border-radius: 9999px;
        background: var(--color-text-primary);
        color: var(--color-abyss);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9375rem;
        transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1), box-shadow 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      }
      a.cta:hover { transform: translateY(-1px); box-shadow: 0 0 24px -4px rgba(255,255,255,0.3); }
      a.cta:active { transform: translateY(0) scale(0.98); }
      a.cta .arr {
        display: inline-flex; align-items: center; justify-content: center;
        width: 1.5rem; height: 1.5rem; border-radius: 9999px;
        background: rgba(0,0,0,0.15);
        transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      }
      a.cta:hover .arr { transform: translate(2px, -1px); }
      .grid {
        position: fixed; inset: 0; pointer-events: none; opacity: 0.35; z-index: -1;
        background-image: radial-gradient(circle, rgba(255,255,255,0.10) 0.7px, transparent 0.7px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse 100% 80% at 50% 50%, #000 30%, transparent 90%);
        -webkit-mask-image: radial-gradient(ellipse 100% 80% at 50% 50%, #000 30%, transparent 90%);
      }
    </style>
  </head>
  <body>
    <div class="grid" aria-hidden="true"></div>
    <main class="wrap">
      <div class="code"><span class="dot"></span>HTTP 404 · path not found</div>
      <h1>Off the map.</h1>
      <p>The page you're looking for doesn't exist — or moved when we shipped the new stack. Head back to the surface.</p>
      <a class="cta" href="/">
        Back to AgentShark
        <span class="arr">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12" />
            <polyline points="12 5 19 12 12 19" />
          </svg>
        </span>
      </a>
    </main>
  </body>
</html>
